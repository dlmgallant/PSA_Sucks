<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PSA Sucks - Centering Tool V5</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">PSA Sucks <span>V5</span></div>
    <div class="side-toggle" role="tablist" aria-label="Card side">
      <button id="frontTab" class="active" data-side="front">Front</button>
      <button id="backTab" data-side="back">Back</button>
    </div>
    <button id="settingsBtn" class="ghost">Settings</button>
  </header>

  <main class="app-shell">
    <section class="toolbar">
      <label class="file-btn">
        <input id="imageLoader" type="file" accept="image/*" />
        Load Image
      </label>
      <button id="fitBtn">Fit</button>
      <button id="rotateLeftBtn">⟲</button>
      <button id="rotateRightBtn">⟳</button>
      <button id="contrastBtn">Contrast</button>
      <button id="resetGuidesBtn">Reset Guides</button>
      <button id="panModeBtn" aria-pressed="false">Pan Mode</button>
      <button id="saveSessionBtn">Save</button>
      <label class="file-btn compact">
        <input id="loadSessionInput" type="file" accept="application/json" />
        Load
      </label>
      <button id="csvBtn">CSV</button>
    </section>

    <section class="viewer-wrap">
      <canvas id="canvas"></canvas>
      <div id="statusBar" class="statusbar">Load a front image to start.</div>
    </section>

    <section class="results">
      <div class="result-card">
        <h3>Current Side</h3>
        <div id="currentSideResult">No image loaded.</div>
      </div>
      <div class="result-card">
        <h3>Front / Back Summary</h3>
        <div id="summaryResult">Load both sides for a summary.</div>
      </div>
    </section>
  </main>

  <aside id="settingsPanel" class="settings-panel hidden" aria-hidden="true">
    <div class="settings-header">
      <h2>Settings</h2>
      <button id="closeSettingsBtn" class="ghost">Close</button>
    </div>

    <div class="settings-grid">
      <label>
        Grid Density
        <input id="gridDensity" type="range" min="4" max="60" step="1" />
      </label>
      <label>
        Major Grid Every
        <input id="majorEvery" type="range" min="2" max="10" step="1" />
      </label>
      <label>
        Grid Opacity
        <input id="gridOpacity" type="range" min="0.02" max="0.5" step="0.01" />
      </label>
      <label>
        Grid Color
        <input id="gridColor" type="color" />
      </label>
      <label>
        Anchor Size
        <input id="anchorSize" type="range" min="4" max="18" step="1" />
      </label>
      <label>
        Boundary Color
        <input id="boundaryColor" type="color" />
      </label>
      <label>
        Line Hitbox
        <input id="hitPadding" type="range" min="6" max="28" step="1" />
      </label>
      <label>
        Zoom Step
        <input id="zoomStep" type="range" min="0.003" max="0.06" step="0.001" />
      </label>
      <label class="checkbox-row">
        <input id="dimOutside" type="checkbox" />
        Dim outside image bounds
      </label>
      <label class="checkbox-row">
        <input id="showGrid" type="checkbox" />
        Show grid
      </label>
      <label class="checkbox-row">
        <input id="highlightHover" type="checkbox" />
        Highlight hovered guide
      </label>
      <label class="checkbox-row">
        <input id="showMagnifier" type="checkbox" />
        Show magnifier while dragging
      </label>
    </div>
  </aside>

  <script src="app.js"></script>
</body>
</html>
